services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      STORAGE_PATH: /app/storage
      MAX_FILE_SIZE_MB: "50"
      ALLOWED_ORIGINS: "http://localhost:3000"
    volumes:
      - chordsync_storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chordsync_storage:
